version: '3.8'

services:
  ai-employee-cloud:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: ai-employee-cloud
    restart: unless-stopped

    environment:
      - NODE_ENV=production
      - VAULT_PATH=/app/AI_Employee_Vault
      - MODE=cloud
      - DRY_RUN=false
      - TZ=Asia/Karachi

      # Gmail API (safe to be in cloud)
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET}
      - GMAIL_REFRESH_TOKEN=${GMAIL_REFRESH_TOKEN}

      # LinkedIn API (safe)
      - LINKEDIN_ACCESS_TOKEN=${LINKEDIN_ACCESS_TOKEN}
      - LINKEDIN_PERSON_URN=${LINKEDIN_PERSON_URN}

      # Social APIs (safe)
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN}
      - FB_ACCESS_TOKEN=${FB_ACCESS_TOKEN}

      # CRITICAL: These are NOT set in cloud
      # - WHATSAPP_SESSION (stays local only)
      # - BANK_API_TOKEN (stays local only)
      # - PAYMENT_CREDENTIALS (stays local only)

    volumes:
      - vault-data:/app/AI_Employee_Vault
      - logs-data:/app/logs

    healthcheck:
      test: ["CMD", "node", "scripts/health-check.js"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - ai-employee-net

volumes:
  vault-data:
    driver: local
  logs-data:
    driver: local

networks:
  ai-employee-net:
    driver: bridge
